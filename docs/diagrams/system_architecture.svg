  <rect x="1322" y="440" width="204" height="66" class="node"/><text x="1424" y="467" text-anchor="middle" class="t">独立可运行代码</text><text x="1424" y="491" text-anchor="middle" class="s">候选 / 修复 / 版本</text>
  <rect x="1322" y="530" width="204" height="66" class="node"/><text x="1424" y="557" text-anchor="middle" class="t">业务 / 技术报告</text><text x="1424" y="581" text-anchor="middle" class="s">JSON · Markdown · Trace</text>
  <rect x="1322" y="620" width="204" height="66" class="node"/><text x="1424" y="647" text-anchor="middle" class="t">知识图谱</text><text x="1424" y="671" text-anchor="middle" class="s">JSON · GraphML · HTML</text>
  <path d="M1322 243 H1198" class="dash"/><path d="M1322 333 H1198" class="dash"/>
  <path d="M1238 473 H1322" class="line"/><path d="M1238 563 H1322" class="line"/><path d="M1238 653 H1322" class="line"/>
