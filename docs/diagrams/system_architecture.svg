  <rect x="333" y="772" width="905" height="126" class="box"/>
  <text x="785" y="807" text-anchor="middle" class="h">库存预测行业适配层</text>
  <text x="785" y="839" text-anchor="middle" class="t">数据标准化 → 需求画像 → 滚动预测 → 非对称库存成本 → 约束补货建议</text>
